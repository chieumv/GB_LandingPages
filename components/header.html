<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="./public/images/Logo-GB-1024x1024_2.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GreatBless</title>
    <style>
      :root {
        --bg-page: #100120;
        --header-bg: #250047;
        --hero-bg: #07163a;
        --platform-bg: #0b1a3d;
        --about-bg: #1d032c;
        --edge-bg: #0d1837;
        --ticker-bg: #2a0054;
        --footer-bg: #000f33;
        --txt-main: #fff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: var(--bg-page);
        color: var(--txt-main);
      }
      .container {
        max-width: 1600px;
        margin: 0 auto;
        padding: 0 24px;
      }

      .site-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        background: var(--header-bg);
        transition: all 0.3s ease;
      }
      .site-header.scrolled {
        background: rgba(37, 0, 71, 0.9);
        backdrop-filter: blur(8px);
      }
      .header-inner {
        min-height: 88px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .menu-toggle {
        display: none;
        width: 40px;
        height: 40px;
        margin-right: 5px;
        border: 1px solid rgba(133, 247, 255, 0.45);
        border-radius: 8px;
        background: transparent;
        color: #7cecff;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }
      .menu-toggle svg {
        width: 20px;
        height: 20px;
      }
      .menu-toggle .icon-close {
        display: none;
      }
      .site-header.menu-open .menu-toggle .icon-open {
        display: none;
      }
      .site-header.menu-open .menu-toggle .icon-close {
        display: block;
      }
      .brand p {
        margin: 0;
        font-size: 30px;
        font-weight: 700;
      }
      .menu {
        display: none;
        gap: 22px;
      }
      .menu button {
        border: 0;
        background: transparent;
        color: #fff;
        cursor: pointer;
        font-size: 15px;
        font-weight: 600;
      }
      .menu button:hover {
        color: #85f7ff;
      }
      .header-cta {
        display: flex;
        gap: 10px;
      }
      .btn {
        border: 1px solid transparent;
        border-radius: 10px;
        padding: 10px 14px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.25s ease;
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        line-height: 1;
      }
      .btn-login {
        border-color: #22d3ee;
        background: transparent;
        color: #7cecff;
        font-size: 15px;
      }
      .btn-login:hover {
        background: rgba(34, 211, 238, 0.1);
      }
      .btn-account {
        background: #3ecbf2;
        color: black;
        font-size: 15px;
      }
      .btn-account:hover {
        background: #67e8f9;
        color: #101010;

      }
      main {
        padding-top: 88px;
      }
      section {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }
      .hero {
        position: relative;
        overflow: hidden;
        background: var(--hero-bg);
      }
      .hero::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(circle at top, rgba(74, 122, 255, 0.18), transparent 48%);
      }
      .hero-inner {
        min-height: 640px;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 80px 0;
      }
      .hero-content {
        max-width: 980px;
        animation: heroTitleDown 0.7s ease-out both;
      }
      h1 {
        margin: 0;
        font-size: 42px;
        line-height: 1.1;
        color: #d7dfea;
      }
      .hero p {
        margin: 28px auto 0;
        max-width: 950px;
        font-size: 30px;
        line-height: 1.65;
        color: #aebacf;
      }
      .hero-actions {
        margin-top: 34px;
        display: flex;
        gap: 16px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .hero-actions .btn {
        font-size: 18px;
        padding: 14px 26px;
        border-radius: 12px;
      }
      .btn-primary {
        background: #2d66df;
      }
      .btn-primary:hover {
        background: #3a74ef;
      }
      .btn-outline {
        background: transparent;
        border-color: #344c73;
      }
      .btn-outline:hover {
        background: rgba(255, 255, 255, 0.06);
      }
      .section-pad {
        padding: 58px 0;
      }
      h2 {
        margin: 0 0 24px;
        text-align: center;
        font-size: 35px;
      }
      .platforms {
        background: var(--platform-bg);
      }
      .cards-2 {
        display: grid;
        gap: 24px;
      }
      .platform-card {
        position: relative;
        overflow: hidden;
        border: 1px solid #2b3f65;
        border-radius: 24px;
        background: linear-gradient(90deg, #1c2b46, #162741);
        padding: 32px;
      }
      .platform-card svg.icon-big {
        width: 120px;
        height: 120px;
        position: absolute;
        right: 24px;
        top: 24px;
        color: #3a4d70;
      }
      .platform-card:hover svg.icon-big {
        color: #fff;
      }
      .platform-card h3 {
        margin: 0;
        font-size: 25px;
        padding-right: 140px;
      }
      .platform-card p {
        margin: 18px 0 0;
        max-width: 700px;
        color: #9eb3d1;
        font-size: 17px;
        line-height: 1.6;
        padding-right: 140px;
        text-align: justify;
      }
      .platform-card .btn {
        margin-top: 24px;
        width: 100%;
      }
      .about {
        background: var(--about-bg);
        text-align: center;
      }
      .about p {
        margin: 14px auto;
        max-width: 1200px;
        color: #d6dbeb;
        line-height: 1.65;
        font-size: 21px;
      }
      .edge {
        background: var(--edge-bg);
      }
      .cards-4 {
        margin-top: 26px;
        display: grid;
        gap: 18px;
      }
      .edge-card {
        position: relative;
        border: 1px solid #2c3f63;
        border-radius: 22px;
        background: #1a2a48;
        padding: 26px;
      }
      .edge-card .edge-icon {
        width: 34px;
        height: 34px;
        color: #fcd34d;
      }
      .edge-card:hover {
        border-color: #fcd34d;
      }
      .edge-card h3 {
        margin: 12px 0 0;
        font-size: 25px;
      }
      .edge-card p {
        margin: 12px 0 0;
        line-height: 1.6;
        color: #a8bdd9;
        text-align: justify;
      }
      .ticker {
        background: var(--ticker-bg);
        padding: 34px 0;
      }
      .ticker-wrap {
        overflow: hidden;
      }
      .ticker-track {
        display: flex;
        width: max-content;
        gap: 20px;
        animation: gb-marquee 24s linear infinite;
      }
      .ticker-wrap:hover .ticker-track {
        animation-play-state: paused;
      }
      .ticker-item {
        border: 1px solid #67e8f9;
        border-radius: 10px;
        padding: 12px 22px;
        box-shadow: 0 0 14px rgba(44, 214, 255, 0.55);
        display: flex;
        gap: 8px;
        white-space: nowrap;
      }
      .site-footer {
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        background: var(--footer-bg);
      }
      .footer-top {
        padding: 56px 0 28px;
        display: grid;
        gap: 28px;
      }
      .footer-top h3,
      .footer-top h4 {
        margin: 0;
        font-size: 20px;
      }
      .footer-brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .footer-brand svg {
        width: 80px;
        height: 80px;
        flex: 0 0 auto;
      }
      .footer-top p,
      .footer-top a,
      .footer-copy,
      .footer-legal {
        color: #9bb0d2;
        line-height: 1.65;
      }

      .footer-top a {
        text-decoration: none;
        display: block;
        margin-top: 8px;
      }
      .footer-top a:hover {
        color: #fff;
      }
      .divider {
        height: 1px;
        background: rgba(255, 255, 255, 0.15);
        margin: 12px 0 22px;
      }
      .footer-legal strong {
        color: #fff;
      }
      .footer-legal p {
        text-align: justify;
      }
      .footer-legal p strong {
        display: inline-block;
        margin-bottom: 2px;
      }
      .footer-legal p:has(> strong) {
        margin-bottom: 4px;
      }
      .footer-legal .legal-indent {
        margin: 4px 0 0 20px;
      }
      .footer-copy {
        margin: 18px 0 0;
        text-align: center;
        padding-bottom: 30px;
      }
      @media (min-width: 1200px) {
        .menu {
          display: flex;
        }
        .cards-2 {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (max-width: 1199px) {
        .header-inner {
          min-height: auto;
          padding: 12px 0;
          flex-wrap: wrap;
        }
        .brand {
          order: 1;
        }
        .brand svg {
          width: 56px;
          height: 56px;
        }
        .brand p {
          font-size: 24px;
        }
        .menu-toggle {
          display: inline-flex;
          order: 2;
          margin-left: auto;
        }
        .header-cta {
          display: none;
          order: 4;
          width: calc(100% - 40px);
          margin: 0 20px;
          gap: 8px;
          padding-top: 8px;
          flex-direction: column;
        }
        .header-cta .btn {
          width: 100%;
          min-height: 38px;
          padding: 8px 12px;
          font-size: 14px;
        }
        .menu {
          display: none;
          order: 3;
          width: calc(100% - 40px);
          margin: 0 20px;
          gap: 8px;
          padding-top: 8px;
          flex-direction: column;
        }
        .site-header.menu-open .menu,
        .site-header.menu-open .header-cta {
          display: flex;
        }
        .menu button {
          width: 100%;
          border: 1px solid rgba(133, 247, 255, 0.35);
          border-radius: 8px;
          padding: 10px 12px;
          background: rgba(255, 255, 255, 0.05);
          text-align: left;
        }
        main {
          padding-top: 96px;
        }
      }
      @media (min-width: 768px) {
        .cards-4 {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .footer-top {
          grid-template-columns: 2fr 1fr 1fr;
        }
      }
      @media (min-width: 1280px) {
        .cards-4 {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }
      @media (max-width: 767px) {
        .platform-card svg.icon-big {
          width: 86px;
          height: 86px;
          right: 18px;
          top: 18px;
        }
        .platform-card h3,
        .platform-card p {
          padding-right: 96px;
        }
      }
      @keyframes gb-marquee {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translateX(-50%);
        }
      }
      @keyframes heroTitleDown {
        from {
          opacity: 0;
          transform: translateY(-36px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .try-now{
        background-color: white;
      }
      .try-now:hover {
        border-color: #00ffcc;
        box-shadow:
          0 0 10px #00ffcc,
          0 0 25px rgba(0,255,204,0.6);
        transform: translateY(-2px);
        background-color: white;
      }
      .ea-showcase-wrap {
        padding: 50px;
        background: #f5f7fb;
      }
      .ea-showcase {
        background: #ffffff;
        border-radius: 22px;
        padding: 30px;
        box-shadow: 0 8px 30px rgba(10, 24, 50, 0.12);
      }
      .ea-grid {
        display: grid;
        gap: 26px;
      }
      .ea-list {
        display: grid;
        gap: 18px;
      }
      .ea-item {
        border-radius: 18px;
        padding: 18px 28px;
        background: #d9e9f0;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .ea-item:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 18px rgba(10, 24, 50, 0.14);
      }
      .ea-item.active {
        background: #1b9dc2;
        color: #ffffff;
      }
      .ea-item h3 {
        margin: 0;
        font-size: 24px;
        line-height: 1.25;
        color: #072a61;
      }
      .ea-item.active h3 {
        color: #ffffff;
      }
      .ea-item p {
        margin: 8px 0 0;
        font-size: 18px;
        line-height: 1.45;
        color: #3e618f;
      }
      .ea-item.active p {
        color: rgba(255, 255, 255, 0.92);
      }
      .ea-media {
        border-radius: 18px;
        overflow: hidden;
        align-self: start;
      }
      .ea-media img {
        display: block;
        width: 100%;
        height: auto;
        border-radius: inherit;
      }
      .ea-footer {
        margin-top: 20px;
        display: flex;
        gap: 20px;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
      }
      .ea-link {
        margin: 0;
        font-size: 18px;
        color: #2b4e7d;
      }
      .ea-link a {
        color: #0d9ec6;
        text-decoration: none;
      }
      .ea-link a:hover {
        text-decoration: underline;
      }
      .ea-cta {
        min-width: 240px;
        border: 0;
        border-radius: 12px;
        background: #1aa4cc;
        color: #ffffff;
        font-size: 18px;
        font-weight: 700;
        padding: 14px 28px;
        cursor: pointer;
      }
      .ea-cta:hover {
        background: #1bb4e0;
      }
      @media (min-width: 1024px) {
        .ea-grid {
          grid-template-columns: 1fr 1.5fr;
          align-items: start;
        }
      }
      @media (max-width: 1023px) {
        .ea-item h3 {
          font-size: 20px;
        }
        .ea-showcase {
          padding: 18px;
        }
        .ea-media {
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <header id="site-header" class="site-header">
      <div class="container header-inner">
        <button type="button" class="menu-toggle" id="menu-toggle" aria-label="Open navigation menu" aria-expanded="false" aria-controls="site-menu">
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path class="icon-open" d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
            <path class="icon-close" d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </button>
        <div class="brand">
         <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 1536 1024" preserveAspectRatio="xMidYMid meet">


          <rect width="100%" height="100%" fill="#FFFFFF"/>

          <g transform="translate(0,1024) scale(0.1,-0.1)" stroke="none">

            <!-- G -->
            <path fill="#FF1A1A" d="M4575 8249 c-38 -5 -128 -16 -200 -25 -205 -25 -413 -73 -616 -142 -772 -264 -1384 -831 -1708 -1582 -167 -388 -260 -878 -261 -1375 0 -540 90 -988 289 -1442 314 -713 985 -1292 1786 -1541 146 -46 232 -69 290 -77 22 -3 54 -10 70 -15 41 -12 168 -32 325 -51 140 -17 659 -23 790 -10 255 26 299 32 385 47 113 20 354 77 460 109 503 150 945 424 1250 775 267 307 472 736 551 1150 3 14 11 57 19 95 13 66 19 114 45 357 5 54 10 344 10 657 l0 561 -1670 0 -1670 0 0 -625 0 -625 860 0 c527 0 860 -4 860 -9 0 -5 -7 -43 -15 -83 -71 -339 -274 -644 -551 -824 -182 -119 -416 -207 -646 -244 -186 -29 -438 -27 -603 5 -104 20 -138 29 -216 55 -340 114 -639 337 -840 627 -322 466 -424 1133 -263 1708 85 302 236 565 449 780 257 259 552 418 900 482 80 15 230 17 1325 22 l1235 6 45 66 c267 391 704 1027 778 1132 l33 47 -1713 -1 c-942 -1 -1744 -5 -1783 -10z"/>

            <!-- B -->
            <path fill="#004FC2" d="M8663 8228 c-12 -18 -73 -109 -137 -202 l-116 -169 0 -989 0 -988 635 0 635 0 0 560 0 560 810 0 c757 0 818 -1 948 -20 356 -51 548 -190 628 -455 14 -46 18 -91 18 -190 -1 -116 -4 -138 -28 -199 -35 -92 -56 -123 -121 -187 -114 -112 -270 -172 -510 -199 -53 -6 -434 -10 -921 -10 -457 0 -845 -3 -861 -6 -25 -5 -49 -35 -155 -192 -70 -103 -177 -261 -239 -352 -259 -383 -347 -512 -424 -625 -45 -66 -157 -231 -248 -367 l-167 -247 0 -971 0 -970 1598 0 c1423 0 1776 5 1913 24 19 3 72 10 119 16 355 46 753 184 1020 353 201 128 419 332 527 492 194 289 273 558 273 927 0 246 -31 423 -108 613 -149 369 -419 634 -809 791 -40 16 -73 32 -73 35 0 3 22 18 50 33 121 66 270 197 360 316 70 93 168 312 186 415 3 17 9 46 14 65 20 76 32 269 26 410 -5 126 -10 171 -30 276 -33 169 -117 380 -205 514 -108 166 -192 262 -331 379 -358 301 -812 492 -1355 568 -107 15 -273 17 -1510 20 l-1390 3 -22 -32z m3099 -3767 c196 -34 313 -79 417 -162 166 -133 225 -397 139 -627 -22 -60 -100 -163 -156 -206 -50 -38 -162 -92 -242 -116 -165 -49 -198 -50 -1195 -50 l-935 0 0 590 0 590 929 0 c873 0 937 -1 1043 -19z"/>

          </g>
        </svg>
          <p>GreatBless</p>
        </div>

        <nav id="site-menu" class="menu">
          <button type="button" data-target="platforms" style="font-size: 18px;">Platforms</button>
          <button type="button" data-target="about-us" style="font-size: 18px;">About Us</button>
          <button type="button" data-target="why-choose-us" style="font-size: 18px;">Why Choose Us</button>
          <button type="button" onclick="window.location.href='./pages/blog'" style="font-size: 18px; text-decoration: none;">Blog</button>
        </nav>

        <div class="header-cta">
          <a href="https://trading.greatbless.com/user-auth/login" class="btn btn-login" style="text-decoration: none; color: white;">LOGIN</a>
          <a href="https://trading.greatbless.com/user-auth/register" class="btn btn-account" style="text-decoration: none; color: black;">Open Account</a>
        </div>
      </div>
    </header>

    <script>
      const header = document.getElementById("site-header");
      const menuToggle = document.getElementById("menu-toggle");
      const navButtons = document.querySelectorAll("[data-target]");
      const mobileQuery = window.matchMedia("(max-width: 1199px)");
      const eaItems = document.querySelectorAll(".ea-item[data-image]");
      const eaMediaImg = document.getElementById("ea-media-img");

      const onScroll = () => {
        if (window.scrollY > 6) {
          header.classList.add("scrolled");
        } else {
          header.classList.remove("scrolled");
        }
      };

      navButtons.forEach((button) => {
        button.addEventListener("click", () => {
          const id = button.getAttribute("data-target");
          const section = document.getElementById(id);
          if (!section) return;
          const headerOffset = 88;
          const sectionTop = section.getBoundingClientRect().top + window.scrollY;
          window.scrollTo({ top: sectionTop - headerOffset, behavior: "smooth" });
          if (mobileQuery.matches) {
            header.classList.remove("menu-open");
            menuToggle.setAttribute("aria-expanded", "false");
          }
        });
      });

      menuToggle.addEventListener("click", () => {
        const isOpen = header.classList.toggle("menu-open");
        menuToggle.setAttribute("aria-expanded", isOpen ? "true" : "false");
      });

      const setEaImage = (imageUrl) => {
        if (!eaMediaImg || !imageUrl) return;
        eaMediaImg.src = imageUrl;
      };

      eaItems.forEach((item) => {
        item.addEventListener("click", () => {
          eaItems.forEach((entry) => entry.classList.remove("active"));
          item.classList.add("active");
          setEaImage(item.getAttribute("data-image"));
        });
      });

      const defaultItem = document.querySelector(".ea-item.active[data-image]");
      if (defaultItem) {
        setEaImage(defaultItem.getAttribute("data-image"));
      }

      window.addEventListener("scroll", onScroll);
      onScroll();
    </script>
  </body>
</html>
